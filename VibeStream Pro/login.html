<!DOCTYPE html>
<html>
<head>
<title>LOGIN PAGE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Griffy');

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
      url('bg.gif') center/cover no-repeat;
    font-family: Arial, sans-serif;
  }

  .header {
    width: 100%;
  }

  .header img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    display: block;
  }

  .header2 {
    min-height: calc(100vh - 230px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }

  .login-box {
    background: black;
    width: 100%;
    max-width: 500px;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
  }

  .login-box img {
    width: 200px;
    max-width: 100%;
    margin-bottom: 15px;
  }

  .subtitle {
    color: #800000;
    margin: 0 0 30px;
    font-size: 50px;
    font-family: "Griffy", cursive;
    font-weight: 700;
  }

  .input-group {
    margin-bottom: 22px;
    text-align: left;
  }

  .input-group label {
    font-size: 14px;
    color: #aaa;
  }

  .input-group input {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border-radius: 12px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-size: 14px;
  }

  .input-group input::placeholder {
    color: #aaa;
  }

  .input-group input:focus {
    outline: none;
    box-shadow: 0 0 10px #800000;
  }

  button {
    width: 100%;
    padding: 15px;
    background: white;
    border: none;
    border-radius: 14px;
    color: black;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #800000;
    box-shadow: 0 0 20px #800000;
  }

  .links {
    margin-top: 25px;
    font-size: 14px;
  }

  .links hr {
    margin: 25px 0;
    border: 0.5px solid #333;
  }

  @media (max-width: 600px) {
    .header img {
      height: 160px;
    }

    .header2 {
      min-height: calc(100vh - 160px);
      padding: 16px;
    }

    .login-box {
      padding: 24px;
      border-radius: 20px;
    }

    .subtitle {
      font-size: 38px;
    }
  }
</style>
</head>

<body>
  <div class="header">
    <img src="banner.png" alt="Banner">
  </div>

  <div class="header2">
    <div class="login-box">
      <img src="guy.png" alt="Login">
      <p class="subtitle">Log In</p>

      <form onsubmit="return loginUser()">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password">
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <div class="links">
        <p><a href="#"><button type="button">Forgot Password?</button></a></p>
        <hr>
      </div>
    </div>
  </div>

  <script>
    function loginUser() {
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value.trim();

      if (email.includes("@") && password !== "") {
        window.location.href = "index.html";
      } else {
        alert("Please enter a valid email and password.");
      }

      return false;
    }
  </script>
</body>
</html>
