<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockMaster User Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell centered-shell">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="brand-inline centered-brand">
          <img class="brand-logo" src="Logo.png" alt="StockMaster logo">
          <span class="nav-title">StockMaster</span>
        </div>

        <p class="eyebrow">User Login</p>
        <h1 class="auth-title">Access invoice creation and client tracking.</h1>
        <p class="auth-copy">Users can create invoices, monitor clients, and continue adding new billing records.</p>

        <form class="invoice-form" id="userLoginForm">
          <label>
            Username
            <input type="text" id="userEmail" placeholder="Enter username" required>
          </label>
          <label>
            Password
            <input type="password" id="userPassword" placeholder="Enter password" required>
          </label>

          <div class="button-row">
            <button type="submit" class="primary-action">Login as User</button>
            <a class="ghost-action nav-link" href="index.html">Back Home</a>
          </div>
        </form>

        <p class="auth-hint" id="userLoginStatus">Use the assigned username and password to continue.</p>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
