<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Velvet Crust Cakes | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" aria-label="Velvet Crust Cakes home">
            <img class="site-header-img" src="header.png" alt="Velvet Crust Cakes header">
        </a>
    </header>

    <main class="auth-page" aria-label="Login page">
        <div class="container auth-container">
            <section id="login" class="page active">
                <div class="auth-head">
                    <h2 class="section-title">Login</h2>
                    <a class="auth-back" href="index.html">Back to Home</a>
                </div>

                <form class="auth-form" autocomplete="on">
                    <div class="field">
                        <label class="field-label" for="email">Email</label>
                        <input class="field-input" id="email" name="email" type="email" placeholder="name@example.com" required>
                    </div>

                    <div class="field">
                        <label class="field-label" for="password">Password</label>
                        <input class="field-input" id="password" name="password" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
                    </div>

                    <label class="field-check">
                        <input type="checkbox" name="remember" checked>
                        <span>Remember me</span>
                    </label>

                    <button class="btn btn-primary" type="submit">Log in</button>

                    <p class="auth-fineprint"><a href="shop.html">Continue to Shop</a></p>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
