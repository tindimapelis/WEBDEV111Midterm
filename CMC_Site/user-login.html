<!doctype html>
<html lang="en" data-page="user-login.html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMC Site - User Login</title>
    <link rel="icon" href="logo.jpg" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body class="page-enter">
    <main class="login-screen-shell">
      <p class="login-screen-label">Account</p>

      <section class="login-stage-frame">
        <div class="login-card-wrap login-card-wrap-single">
          <article class="login-panel login-panel-user login-panel-centered" id="user">
            <a class="login-back-link" href="index.html" aria-label="Back to home">&#8249; Back</a>
            <img class="login-floating-logo" src="logo.jpg" alt="CMC logo" />
            <div class="login-title-stack">
              <p>Member Access</p>
              <div class="login-divider-heading">
                <span></span>
                <h1>Login</h1>
                <span></span>
              </div>
            </div>
            <form class="account-form login-form" action="#" method="get" data-account-form="user">
              <label>
                <span>Email Address</span>
                <input type="text" name="user-login" placeholder="Enter your username" autocomplete="username" />
              </label>
              <label>
                <span>Password</span>
                <div class="login-password-field">
                  <input type="password" name="user-password" placeholder="Enter your password" autocomplete="current-password" />
                  <button type="button" class="login-visibility-toggle" data-password-toggle aria-label="Show password">◌</button>
                </div>
              </label>
              <div class="account-form-row login-form-row">
                <a href="#">Forgot password?</a>
              </div>
              <p class="account-auth-message" data-auth-message="user" aria-live="polite"></p>
              <div class="account-actions">
                <button type="submit">Sign In</button>
              </div>
            </form>
            <p class="login-join-link">
              <a href="registration.html">Not a member? Join a Realm</a>
            </p>
          </article>
        </div>
      </section>

      <section class="account-demo-card login-demo-card" aria-labelledby="user-demo-title">
        <p class="announcement-card-label">Demo Account</p>
        <h2 id="user-demo-title">User Demo Credentials</h2>
        <div class="account-demo-grid account-demo-grid-single">
          <article>
            <h3>User Demo</h3>
            <p><strong>Username:</strong> user</p>
            <p><strong>Password:</strong> 1234</p>
            <div class="account-demo-actions">
              <button class="account-demo-fill" type="button" data-demo-fill="user">Use Demo Account</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
