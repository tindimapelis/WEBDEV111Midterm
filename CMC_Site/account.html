<!doctype html>
<html lang="en" data-page="account.html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMC Site - Login</title>
    <link rel="icon" href="logo.jpg" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body class="page-enter">
    <main class="login-screen-shell">
      <p class="login-screen-label">Account</p>

      <section class="login-stage-frame">
        <div class="login-card-wrap login-card-wrap-single">
          <article class="login-panel login-panel-centered">
            <a class="login-back-link" href="index.html" aria-label="Back to home">&#8249; Back</a>
            <img class="login-floating-logo" src="logo.jpg" alt="CMC logo" />
            <div class="login-title-stack">
              <p>Consortium Access</p>
              <div class="login-divider-heading">
                <span></span>
                <h1>Login</h1>
                <span></span>
              </div>
            </div>
            <form class="account-form login-form" action="#" method="get" data-account-form="portal">
              <label>
                <span>Username</span>
                <input type="text" name="portal-login" placeholder="Enter your username" autocomplete="username" />
              </label>
              <label>
                <span>Password</span>
                <div class="login-password-field">
                  <input type="password" name="portal-password" placeholder="Enter your password" autocomplete="current-password" />
                  <button type="button" class="login-visibility-toggle" data-password-toggle aria-label="Show password">Show</button>
                </div>
              </label>
              <div class="account-form-row login-form-row">
                <a href="#">Forgot password?</a>
              </div>
              <p class="account-auth-message" data-auth-message="portal" aria-live="polite"></p>
              <div class="account-actions">
                <button type="submit" data-portal-submit>Sign In</button>
              </div>
            </form>
          </article>
        </div>
      </section>

      <section class="account-demo-card login-demo-card" aria-labelledby="portal-demo-title">
        <p class="announcement-card-label">Demo Accounts</p>
        <h2 id="portal-demo-title">Quick Demo Access</h2>
        <div class="account-demo-grid">
          <article>
            <h3>Member Demo</h3>
            <p><strong>Username:</strong> user</p>
            <p><strong>Password:</strong> 1234</p>
            <div class="account-demo-actions">
              <button class="account-demo-fill" type="button" data-demo-fill="user">Use Member Demo</button>
            </div>
          </article>
          <article>
            <h3>Admin Demo</h3>
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> 1234</p>
            <div class="account-demo-actions">
              <button class="account-demo-fill" type="button" data-demo-fill="admin">Use Admin Demo</button>
            </div>
          </article>
          <article>
            <h3>Super Admin Demo</h3>
            <p><strong>Username:</strong> superadmin</p>
            <p><strong>Password:</strong> 1234</p>
            <div class="account-demo-actions">
              <button class="account-demo-fill" type="button" data-demo-fill="superadmin">Use Super Admin Demo</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
