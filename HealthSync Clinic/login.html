<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | HealthSync Clinic</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body data-page="login">
  <div class="page-bg" aria-hidden="true">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
  </div>

  <header class="portal-header">
    <div class="brand-block">
      <div class="brand-mark">HS</div>
      <div>
        <p class="eyebrow">Admin Portal</p>
        <h1>HealthSync Clinic</h1>
      </div>
    </div>
    <nav class="header-nav">
      <a class="nav-link" href="index.html">Back to Website</a>
      <button class="logout-button" type="button" data-logout>Clear Session</button>
    </nav>
  </header>

  <main class="portal-shell">
    <section class="login-stack">
      <article class="login-panel">
        <p class="eyebrow">Sign In</p>
        <h2>Enter your admin sign-in details.</h2>
        <p class="helper-text">Use the admin credentials below or tap the card to auto-fill the form. The admin account uses the email <strong>dimapelis@gmail.com</strong>.</p>

        <form id="loginForm">
          <div class="field-group">
            <label for="username">Email or Username</label>
            <input id="username" name="username" type="text" placeholder="Enter email or username" autocomplete="username">
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password">
          </div>

          <button class="submit-button" type="submit">Open Admin Dashboard</button>
          <p id="loginStatus" class="status-note" data-state="idle"></p>
        </form>

        <div class="helper-row">
          <p id="currentSession" class="helper-text" hidden></p>
          <button id="continueSession" class="ghost-link" type="button" hidden>Continue Current Session</button>
        </div>
      </article>

      <section class="demo-block">
        <p class="eyebrow">Admin Demo Credential</p>
        <div id="accountGrid" class="account-grid"></div>
      </section>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
